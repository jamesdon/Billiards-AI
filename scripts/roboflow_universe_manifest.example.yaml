# Copy to roboflow_universe_manifest.yaml (gitignored) and edit versions if download fails.
#
# How to set `version:` (the URL bar often does NOT show it):
#   1) Universe → left sidebar "Dataset" → Download Dataset → "Show download code"
#      → use the number in project.version(N). That N is `version:` here.
#   2) Or open data.yaml inside any ZIP you already have → roboflow: version: N
#   See docs/MODEL_OPTIMIZATION.md → "Finding the Roboflow dataset version".
#
# Download with:
#   export ROBOFLOW_API_KEY='your-key'
#   python3 scripts/roboflow_universe_pull.py --manifest scripts/roboflow_universe_manifest.yaml
#
# Each entry becomes: data/datasets/_imports/<dirname>/

imports:
  - workspace: billiard-ball
    project: billiard-ball
    version: 1
    dirname: billiard-ball_billiard-ball

  - workspace: jdq
    project: table2-kfsub
    version: 1
    dirname: jdq_table2-kfsub

  - workspace: snooker-moldi
    project: snooker-pocket-and-cues
    version: 1
    dirname: snooker-moldi_snooker-pocket-and-cues

  - workspace: thesis-digkz
    project: cue-detection-ciazj
    version: 1
    dirname: thesis-digkz_cue-detection-ciazj

  - workspace: 423drpool
    project: drpool
    version: 1
    dirname: 423drpool_drpool

  - workspace: ours-workspace
    project: pool-cue-instance
    version: 1
    dirname: ours-workspace_pool-cue-instance

  - workspace: taiqiu
    project: billiards-wtibn
    version: 1
    dirname: taiqiu_billiards-wtibn

  # Optional extra pool dataset
  - workspace: pool-table
    project: pool-v2
    version: 1
    dirname: pool-table_pool-v2

  # If a version fails: use Universe → Dataset → Show download code (see header comment), not the URL bar.
