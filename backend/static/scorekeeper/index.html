<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billiards-AI — Score Keeper</title>
    <link rel="stylesheet" href="/static/scorekeeper/style.css" />
    <script>
      (function () {
        var ROOT_PX = { small: "14px", medium: "17px", large: "28px" };
        var k = "billiards-setup-text-size";
        var choice = "medium";
        try {
          var s = localStorage.getItem(k);
          if (s === "small" || s === "medium" || s === "large") choice = s;
        } catch (e) {
          /* ignore */
        }
        document.documentElement.setAttribute("data-text-size", choice);
        document.documentElement.style.fontSize = ROOT_PX[choice];
        try {
          document.cookie =
            "setup_text_size=" +
            encodeURIComponent(choice) +
            "; path=/; max-age=31536000; SameSite=Lax";
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div class="sk-root">
      <header class="sk-header">
        <h1>Score Keeper</h1>
        <p class="sk-sub">Live from <code>GET /live/state</code> · <span id="sk-conn" class="sk-conn">connecting…</span></p>
      </header>

      <section class="sk-grid" aria-live="polite">
        <div class="sk-card sk-card--wide">
          <h2>Scoreboard</h2>
          <div id="sk-teams" class="sk-teams"></div>
          <div id="sk-players" class="sk-players"></div>
        </div>
        <div class="sk-card">
          <h2>Turn &amp; shot</h2>
          <dl class="sk-dl" id="sk-turn"></dl>
        </div>
        <div class="sk-card">
          <h2>Clock / timing</h2>
          <dl class="sk-dl" id="sk-clock"></dl>
        </div>
        <div class="sk-card sk-card--wide">
          <h2>Recent</h2>
          <ul class="sk-list" id="sk-recent"></ul>
        </div>
      </section>
    </div>
    <script src="/static/scorekeeper/app.js"></script>
  </body>
</html>
