<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billiards-AI — Setup guide</title>
    <link rel="stylesheet" href="/static/setup/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>Setup guide</h1>
        <p class="sub">Work through steps in order or jump back anytime. Status: <span class="legend"><span class="signal red" title="Not started"></span> not started</span> · <span class="legend"><span class="signal yellow" title="In progress"></span> in progress</span> · <span class="legend"><span class="signal green" title="Complete"></span> complete</span></p>
        <div class="mjpeg-toolbar">
          <label for="mjpeg-port">MJPEG port (overlay links)</label>
          <input type="number" id="mjpeg-port" min="1024" max="65535" value="8080" />
        </div>
        <ul class="nav-steps" id="nav-steps"></ul>
        <div class="sidebar-footer">
          <div>Repo</div>
          <div class="project-root" id="project-root">…</div>
        </div>
      </aside>
      <main id="content">
        <p>Loading…</p>
      </main>
    </div>
    <div id="status-toast" role="status"></div>
    <script src="/static/setup/app.js"></script>
  </body>
</html>
