<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Billiards-AI</title>
    <link rel="stylesheet" href="/static/setup/style.css" />
    <script>
      (function () {
        var ROOT_PX = { small: "16px", medium: "22px", large: "28px" };
        var k = "billiards-setup-text-size";
        var choice = "medium";
        try {
          var s = localStorage.getItem(k);
          if (s === "small" || s === "medium" || s === "large") choice = s;
        } catch (e) {
          /* ignore */
        }
        document.documentElement.setAttribute("data-text-size", choice);
        document.documentElement.style.fontSize = ROOT_PX[choice];
        try {
          document.cookie =
            "setup_text_size=" +
            encodeURIComponent(choice) +
            "; path=/; max-age=31536000; SameSite=Lax";
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body data-ui-mode="setup">
    <div class="layout">
      <aside class="sidebar">
        <p class="api-backend-line" id="api-backend-line">
          <span
            class="health-lamp health-lamp--unknown"
            id="api-health-lamp"
            role="img"
            aria-label="API health unknown"
            title="GET /health on this backend"
          ></span>
          <span class="api-backend-text"
            >API BACKEND_PORT: default <span id="api-port-shown">8000</span></span
          >
        </p>
        <div class="mjpeg-toolbar">
          <label for="mjpeg-port">MJPEG port: default 8001</label>
          <input type="number" id="mjpeg-port" min="8001" max="8005" value="8001" />
          <p class="mjpeg-ports-allowed">Only ports 8001–8005 can be used</p>
          <div class="mjpeg-health-block" id="mjpeg-health-block" role="status" aria-live="polite">
            <p class="health-row">
              <span
                class="health-lamp health-lamp--unknown"
                id="edge-port-lamp"
                role="img"
                aria-label="Edge health unknown"
                title="edge process GET /health on the MJPEG port"
              ></span>
              <span class="health-line-text" id="edge-port-line">Port 8001: …</span>
            </p>
            <p class="health-row">
              <span
                class="health-lamp health-lamp--unknown"
                id="stream-lamp"
                role="img"
                aria-label="Stream unknown"
                title="Same as edge (MJPEG is served with /health)"
              ></span>
              <span class="health-line-text" id="stream-line"
                >Stream: <a id="stream-href" href="http://127.0.0.1:8001/mjpeg" target="_blank" rel="noopener">http://127.0.0.1:8001/mjpeg</a></span
              >
            </p>
          </div>
        </div>
        <div class="sidebar-app-head" role="tablist" aria-label="View">
          <button
            type="button"
            class="sidebar-tab sidebar-tab--active"
            id="tab-setup"
            data-ui-mode="setup"
            role="tab"
            aria-selected="true"
          >
            Setup guide
          </button>
          <button
            type="button"
            class="sidebar-tab"
            id="tab-sk"
            data-ui-mode="scorekeeper"
            role="tab"
            aria-selected="false"
          >
            Score Keeper
          </button>
        </div>
        <div id="sk-qr-block" class="sk-qr-block" hidden>
          <p class="sk-qr-hint">Open Score Keeper on this network (scan on phone or tablet):</p>
          <div id="sk-qr-canvas" class="sk-qr-canvas" aria-label="QR code to Score Keeper"></div>
          <p class="sk-qr-url" id="sk-qr-url"></p>
        </div>
        <ul class="nav-steps" id="nav-steps"></ul>
        <div class="sidebar-footer">
          <div
            class="text-size-footer"
            id="text-size-group"
            role="radiogroup"
            aria-labelledby="text-size-label"
          >
            <span class="text-size-footer-label" id="text-size-label">Text size</span>
            <label class="text-size-option"
              ><input type="radio" name="text-size" value="small" /> Small</label
            >
            <label class="text-size-option"
              ><input type="radio" name="text-size" value="medium" checked /> Medium</label
            >
            <label class="text-size-option"
              ><input type="radio" name="text-size" value="large" /> Large</label
            >
          </div>
          <div class="sidebar-footer-heading">Repo</div>
          <div class="project-root" id="project-root">…</div>
        </div>
      </aside>
      <div
        class="sidebar-resize"
        id="sidebar-resize"
        role="separator"
        aria-orientation="vertical"
        aria-label="Drag to resize setup sidebar"
        title="Drag to resize"
        tabindex="0"
      ></div>
      <div class="main-wrap">
        <main id="content" class="main-panel main-panel--setup">
          <p>Loading…</p>
        </main>
        <!-- inert + setup-mode CSS keeps this subtree from stealing mouse hits when Score Keeper is hidden (Chromium/GTK quirks on some Jetson desktops). Removed in applyUiMode when switching to scorekeeper. -->
        <div id="sk-embed" class="sk-embed" inert>
          <iframe
            class="sk-iframe"
            id="sk-iframe"
            title="Score Keeper"
            src="about:blank"
            tabindex="-1"
          ></iframe>
        </div>
      </div>
    </div>
    <div id="status-toast" role="status"></div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="/static/setup/app.js"></script>
  </body>
</html>
